name: Terraform Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write   # needed to commit grading.json back to repo

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: latest
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      # Chart is committed in the repo (helm/chart/); build its subchart deps
      # BEFORE terraform init/apply so the helm_release resource can resolve them.
      - name: Build Helm chart dependencies
        run: helm dependency build helm/chart/app/chart

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Generate grading.json (redact sensitive credentials)
        working-directory: terraform
        run: |
          # Generate full output, then redact sensitive values before committing.
          # Real bedrock-dev-view credentials are delivered via the Google Doc only —
          # committing them to the public repo trips AWS secret scanning and quarantines the key.
          terraform output -json | jq '
            (.bedrock_dev_view_access_key_id.value)     |= "REDACTED_SEE_GOOGLE_DOC" |
            (.bedrock_dev_view_secret_access_key.value)  |= "REDACTED_SEE_GOOGLE_DOC" |
            (.bedrock_dev_view_console_password.value)   |= "REDACTED_SEE_GOOGLE_DOC"
          ' > ../grading.json

      - name: Commit grading.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add grading.json
          git diff --staged --quiet || git commit -m "chore: update grading.json [skip ci]"
          git push origin HEAD:main
