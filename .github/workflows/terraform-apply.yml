name: Terraform Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write   # needed to commit grading.json back to repo

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: latest
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      # Chart is committed in the repo (helm/chart/); build its subchart deps
      # BEFORE terraform init/apply so the helm_release resource can resolve them.
      - name: Build Helm chart dependencies
        run: helm dependency build helm/chart/app/chart

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # ── Two-phase apply ──────────────────────────────────────────────────
      # On a from-scratch run the brand-new EKS endpoint hostname takes a few
      # minutes to become DNS-resolvable. If the kubernetes/helm providers try
      # to reach it in the same pass that creates the cluster, they fail with
      # "no such host". So we apply the AWS infra first, wait for the EKS API to
      # be reachable, then apply the in-cluster (kubernetes/helm) resources.
      - name: Terraform Apply — AWS infra (EKS, RDS, IAM, S3/Lambda, DynamoDB)
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.eks \
            -target=module.rds \
            -target=module.dynamodb \
            -target=module.secrets \
            -target=module.iam \
            -target=module.serverless \
            -target=aws_eks_addon.cloudwatch_observability \
            -target=aws_eks_access_entry.github_actions \
            -target=aws_eks_access_policy_association.github_actions \
            -target=aws_iam_user_policy.bedrock_dev_s3_put

      - name: Wait for EKS API endpoint to be reachable
        run: |
          aws eks update-kubeconfig --name project-bedrock-cluster --region us-east-1
          for i in $(seq 1 40); do
            if kubectl get --raw='/readyz' >/dev/null 2>&1; then
              echo "EKS API is reachable."; exit 0
            fi
            echo "Waiting for EKS API endpoint to resolve/serve ($i/40)..."
            sleep 20
          done
          echo "EKS API never became reachable within timeout."; exit 1

      - name: Terraform Apply — full (in-cluster k8s + Helm app deployment)
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Generate grading.json (redact sensitive credentials)
        working-directory: terraform
        run: |
          # Generate full output, then redact sensitive values before committing.
          # Real bedrock-dev-view credentials are delivered via the Google Doc only —
          # committing them to the public repo trips AWS secret scanning and quarantines the key.
          terraform output -json | jq '
            (.bedrock_dev_view_access_key_id.value)     |= "REDACTED_SEE_GOOGLE_DOC" |
            (.bedrock_dev_view_secret_access_key.value)  |= "REDACTED_SEE_GOOGLE_DOC" |
            (.bedrock_dev_view_console_password.value)   |= "REDACTED_SEE_GOOGLE_DOC"
          ' > ../grading.json

      - name: Commit grading.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add grading.json
          git diff --staged --quiet || git commit -m "chore: update grading.json [skip ci]"
          git push origin HEAD:main
