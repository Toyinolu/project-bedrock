name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      # Chart must exist BEFORE terraform init so helm_release can resolve the local path
      - name: Clone retail-store-sample-app chart
        run: |
          git clone --depth 1 https://github.com/aws-containers/retail-store-sample-app.git \
            helm/retail-store-sample-app
          helm dependency build helm/retail-store-sample-app/src/app/chart

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            if (plan.length > 60000) {
              plan = plan.substring(0, 60000) + '\n\n...(output truncated — see workflow logs for full plan)';
            }
            const body = '## Terraform Plan\n\n<details><summary>Show Plan</summary>\n\n```\n' +
              plan + '\n```\n\n</details>\n\n*Triggered by @' +
              context.actor + ' on `' + context.ref + '`*';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
